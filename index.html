<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08080d; --surface: rgba(255,255,255,0.02); --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.08); --text: #e5e7eb; --text-dim: #9ca3af;
    --text-muted: #6b7280; --text-dark: #4b5563; --accent: #f59e0b;
    --legend: #dc2626; --gm: #ef4444; --master: #f59e0b; --diamond: #a855f7;
    --plat: #3b82f6; --gold: #10b981; --silver: #6b7280; --bronze: #78716c;
    --green: #10b981; --red: #ef4444; --mono: 'JetBrains Mono', monospace;
  }
  html { background: var(--bg); color: var(--text); }
  body { font-family: 'Space Grotesk', system-ui, sans-serif; min-height: 100vh; padding: 20px 12px; }
  ::selection { background: rgba(245,158,11,0.3); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .container { max-width: 980px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 28px; }
  .header h1 {
    font-size: 28px; font-weight: 800; margin: 0;
    background: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .sub { font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .tabs { display: flex; gap: 3px; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 3px; }
  .tab {
    padding: 5px 12px; border-radius: 6px; border: none; font-size: 11px;
    font-family: var(--mono); font-weight: 600; cursor: pointer;
    background: transparent; color: var(--text-muted); transition: all 0.15s;
  }
  .tab.active { background: rgba(245,158,11,0.2); color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text-dim); }

  .min-cups { display: flex; align-items: center; gap: 6px; }
  .min-cups span { font-size: 11px; font-family: var(--mono); color: var(--text-muted); }
  .min-cups .val { color: var(--accent); width: 16px; }
  input[type="range"] { width: 70px; accent-color: var(--accent); }

  .chart-panel {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border-bright);
    border-radius: 12px; padding: 16px 12px; margin-bottom: 16px;
    animation: slideDown 0.2s ease-out;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .chart-header .name { font-size: 17px; font-weight: 700; }
  .chart-header .tier {
    margin-left: 8px; font-size: 10px; font-family: var(--mono); opacity: 0.7;
    padding: 2px 6px; border-radius: 4px;
  }
  .chart-header .stats { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  .close-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15); color: var(--text-dim);

  }
  .close-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  .chart-canvas { width: 100%; height: 180px; position: relative; }

  .table { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header {
    display: grid; grid-template-columns: 36px 1fr 58px 58px 40px 58px 46px 38px 52px;
    padding: 10px 14px; border-bottom: 1px solid var(--border-bright);
    font-family: var(--mono); font-size: 9px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .row {
    display: grid; grid-template-columns: 36px 1fr 58px 58px 40px 58px 46px 38px 52px;
    padding: 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: pointer; align-items: center; transition: background 0.1s;
  }
  .row:hover { background: rgba(255,255,255,0.03); }
  .row.selected { background: rgba(245,158,11,0.08); }
  .row.faded { opacity: 0.65; }

  .row .player { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .row .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .row .pname { font-size: 13px; font-weight: 600; color: #f3f4f6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .raw { text-align: right; font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
  .row .elo-cell { text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
  .row .wins-cell { text-align: center; font-family: var(--mono); font-size: 11px; }
  .row .podium-cell { text-align: center; font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  .row .avg-cell { text-align: right; font-family: var(--mono); font-size: 11px; }
  .row .best-cell { text-align: center; font-family: var(--mono); font-size: 11px; }
  .row .peak-cell { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .delta-up { color: var(--green); font-size: 9px; font-weight: 700; }
  .delta-down { color: var(--red); font-size: 9px; font-weight: 700; }
  .elo-delta-up { color: var(--green); font-size: 8px; font-weight: 600; }
  .elo-delta-down { color: var(--red); font-size: 8px; font-weight: 600; }

  .footer { margin-top: 12px; font-family: var(--mono); font-size: 10px; color: var(--text-dark); text-align: center; line-height: 1.6; }

  .tooltip {
    background: rgba(10,10,15,0.95); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 8px 12px; font-family: var(--mono); font-size: 12px;
    pointer-events: none; position: absolute; z-index: 10; display: none;
  }
  .tooltip .t-cup { color: #fff; font-weight: 700; }
  .tooltip .t-pos { color: var(--text-dim); }
  .tooltip .t-pos span { color: var(--accent); }
  .tooltip .t-elo { color: var(--text-dim); }
  .tooltip .t-elo span { color: var(--plat); }

    .header h1 { font-size: 22px; }
  }

});

  tabsEl.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.key === sortKey));
}

// ── MIN CUPS SLIDER ──
const slider = document.getElementById("minCups");
const sliderVal = document.getElementById("minCupsVal");
slider.oninput = () => { minCups = +slider.value; sliderVal.textContent = minCups; render(); };

// ── FILTERING & SORTING ──
function getFiltered() {
  let d = eloData.filter(p => p.cups >= minCups);
  if (sortKey === "rating") d.sort((a,b) => b.rating - a.rating);
  else if (sortKey === "active") d.sort((a,b) => b.active - a.active);
  else if (sortKey === "wins") d.sort((a,b) => b.wins - a.wins || b.active - a.active);
  else if (sortKey === "cups") d.sort((a,b) => b.cups - a.cups || b.active - a.active);
  else if (sortKey === "avg") d.sort((a,b) => a.avg_position - b.avg_position);
  else if (sortKey === "peak") d.sort((a,b) => b.peak_rating - a.peak_rating);
  return d;
}

// ── CHART ──
function drawChart(player) {
  const panel = document.getElementById("chartPanel");
  if (!player || !player.history || player.history.length === 0) { panel.style.display = "none"; return; }
  const c = rColor(player.active);
  const t = tier(player.active);

  panel.style.display = "block";
  panel.innerHTML = `
    <div class="chart-header">
      <div style="min-width:0;overflow:hidden">
        <span class="name" style="color:${c}">${esc(player.name)}</span>
        <span class="tier" style="color:${c};background:${c}15">${t}</span><br>
        <span class="stats">Active ${Math.round(player.active)} · Raw ${Math.round(player.rating)} · ${player.cups} cups · ${player.wins}W · ${player.podiums.silver}S/${player.podiums.bronze}B · avg ${player.avg_position} · peak ${Math.round(player.peak_rating)}</span>
      </div>
      <button class="close-btn" id="closeChart">✕</button>
    </div>
    <div class="chart-canvas"><canvas id="eloCanvas"></canvas><div class="tooltip" id="chartTip"></div></div>
  `;
  document.getElementById("closeChart").onclick = () => { selected = null; panel.style.display = "none"; render(); };

  const canvas = document.getElementById("eloCanvas");
  const tip = document.getElementById("chartTip");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 180 * dpr;
  canvas.style.width = rect.width + "px";
  canvas.style.height = "180px";
  ctx.scale(dpr, dpr);

  const W = rect.width, H = 180;
  const pad = { l: 46, r: 12, t: 12, b: 28 };
  const hist = player.history;
  const ratings = hist.map(h => h.r);
  const rMin = Math.min(...ratings) - 30;
  const rMax = Math.max(...ratings) + 20;
  const cMin = hist[0].c;
  const cMax = hist[hist.length - 1].c;

  function x(cup) { return pad.l + (cup - cMin) / (cMax - cMin || 1) * (W - pad.l - pad.r); }
  function y(rating) { return pad.t + (1 - (rating - rMin) / (rMax - rMin || 1)) * (H - pad.t - pad.b); }

  // Grid
  ctx.strokeStyle = "rgba(255,255,255,0.06)";
  ctx.lineWidth = 1;
  const steps = 5;
  for (let i = 0; i <= steps; i++) {
    const rv = rMin + (rMax - rMin) * i / steps;
    const yv = y(rv);
    ctx.beginPath(); ctx.moveTo(pad.l, yv); ctx.lineTo(W - pad.r, yv); ctx.stroke();
    ctx.fillStyle = "#6b7280"; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
    ctx.fillText(Math.round(rv).toString(), pad.l - 6, yv + 3);
  }

  // 1500 reference
  if (rMin < 1500 && rMax > 1500) {
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.l, y(1500)); ctx.lineTo(W - pad.r, y(1500)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // X axis labels
  ctx.fillStyle = "#6b7280"; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
  const xTicks = Math.min(hist.length, 8);
  for (let i = 0; i < xTicks; i++) {
    const idx = Math.round(i * (hist.length - 1) / (xTicks - 1));
    const h = hist[idx];
    ctx.fillText("#" + h.c, x(h.c), H - 6);
  }

  // Line
  ctx.strokeStyle = c;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  ctx.beginPath();
  hist.forEach((h, i) => { i === 0 ? ctx.moveTo(x(h.c), y(h.r)) : ctx.lineTo(x(h.c), y(h.r)); });
  ctx.stroke();

  // Glow
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = c;
  ctx.lineWidth = 6;
  ctx.beginPath();
  hist.forEach((h, i) => { i === 0 ? ctx.moveTo(x(h.c), y(h.r)) : ctx.lineTo(x(h.c), y(h.r)); });
  ctx.stroke();
  ctx.restore();

  // Dots
  hist.forEach(h => {
    ctx.beginPath(); ctx.arc(x(h.c), y(h.r), 2.5, 0, Math.PI * 2);
    ctx.fillStyle = c; ctx.fill();
  });

  // Tooltip on hover
  canvas.onmousemove = (e) => {
    const br = canvas.getBoundingClientRect();
    const mx = e.clientX - br.left;
    let closest = null, minDist = Infinity;
    hist.forEach(h => {
      const d = Math.abs(x(h.c) - mx);
      if (d < minDist) { minDist = d; closest = h; }
    });
    if (closest && minDist < 30) {
      tip.style.display = "block";
      tip.innerHTML = `<div class="t-cup">Cup #${closest.c}</div><div class="t-pos">Pos: <span>#${closest.p}</span></div><div class="t-elo">Elo: <span>${closest.r.toFixed(1)}</span></div>`;
      let tx = x(closest.c) + 12;
      if (tx + 120 > W) tx = x(closest.c) - 130;
      tip.style.left = tx + "px";
      tip.style.top = (y(closest.r) - 40) + "px";

      // Highlight dot
      ctx.clearRect(0, 0, W, H);
      // Redraw everything (simple approach)
      drawChartContent(ctx, W, H, pad, hist, rMin, rMax, cMin, cMax, c, x, y, xTicks, closest);
    } else {
      tip.style.display = "none";
      ctx.clearRect(0, 0, W, H);
      drawChartContent(ctx, W, H, pad, hist, rMin, rMax, cMin, cMax, c, x, y, xTicks, null);
    }
  };
  canvas.onmouseleave = () => {
    tip.style.display = "none";
    ctx.clearRect(0, 0, W, H);
    drawChartContent(ctx, W, H, pad, hist, rMin, rMax, cMin, cMax, c, x, y, xTicks, null);
  };
}

function drawChartContent(ctx, W, H, pad, hist, rMin, rMax, cMin, cMax, c, x, y, xTicks, highlight) {
  // Grid
  ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.lineWidth = 1;
  const steps = 5;
  for (let i = 0; i <= steps; i++) {
    const rv = rMin + (rMax - rMin) * i / steps;
    const yv = y(rv);
    ctx.beginPath(); ctx.moveTo(pad.l, yv); ctx.lineTo(W - pad.r, yv); ctx.stroke();
    ctx.fillStyle = "#6b7280"; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = "right";
    ctx.fillText(Math.round(rv).toString(), pad.l - 6, yv + 3);
  }
  if (rMin < 1500 && rMax > 1500) {
    ctx.strokeStyle = "rgba(255,255,255,0.12)"; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.l, y(1500)); ctx.lineTo(W - pad.r, y(1500)); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.fillStyle = "#6b7280"; ctx.font = "9px 'JetBrains Mono',monospace"; ctx.textAlign = "center";
  for (let i = 0; i < xTicks; i++) {
    const idx = Math.round(i * (hist.length - 1) / (xTicks - 1));
    ctx.fillText("#" + hist[idx].c, x(hist[idx].c), H - 6);
  }
  // Line
  ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.lineJoin = "round";
  ctx.beginPath();
  hist.forEach((h, i) => { i === 0 ? ctx.moveTo(x(h.c), y(h.r)) : ctx.lineTo(x(h.c), y(h.r)); });
  ctx.stroke();
  // Glow
  ctx.save(); ctx.globalAlpha = 0.15; ctx.strokeStyle = c; ctx.lineWidth = 6;
  ctx.beginPath();
  hist.forEach((h, i) => { i === 0 ? ctx.moveTo(x(h.c), y(h.r)) : ctx.lineTo(x(h.c), y(h.r)); });
  ctx.stroke(); ctx.restore();
  // Dots
  hist.forEach(h => {
    const isHl = highlight && h.c === highlight.c && h.r === highlight.r;
    ctx.beginPath(); ctx.arc(x(h.c), y(h.r), isHl ? 5 : 2.5, 0, Math.PI * 2);
    if (isHl) { ctx.fillStyle = "#fff"; ctx.fill(); ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.stroke(); }
    else { ctx.fillStyle = c; ctx.fill(); }
  });
}

// ── TABLE RENDERING ──
function render() {
  const filtered = getFiltered();
  const body = document.getElementById("tableBody");
  let html = "";

  filtered.forEach((p, i) => {
    const isSel = selected === p.name;
    const faded = Math.abs(p.active - p.rating) > 5;
    const c = rColor(p.active);
    const d = deltas[p.name];

    let rankDelta = "";
    if (d && d[0] !== 0) {
      rankDelta = d[0] > 0
        ? `<span class="delta-up">▲${d[0]}</span>`
        : `<span class="delta-down">▼${Math.abs(d[0])}</span>`;
    }

    let eloDelta = "";
    if (d && Math.abs(d[1]) >= 0.5) {
      eloDelta = d[1] > 0
        ? `<span class="elo-delta-up">+${Math.round(d[1])}</span>`
        : `<span class="elo-delta-down">${Math.round(d[1])}</span>`;
    }

    const winsColor = p.wins > 0 ? "var(--accent)" : "var(--text-dark)";
    const avgColor = p.avg_position <= 5 ? "var(--green)" : p.avg_position <= 10 ? "var(--text-dim)" : "var(--text-muted)";
    const bestColor = p.best_finish === 1 ? "var(--accent)" : p.best_finish <= 3 ? "var(--text-dim)" : "var(--text-muted)";

    html += `<div class="row${isSel ? " selected" : ""}${faded ? " faded" : ""}" data-name="${esc(p.name)}">
      <div class="rank">${i+1}${rankDelta}</div>
      <div class="player"><span class="dot" style="background:${c};box-shadow:0 0 5px ${c}40"></span><span class="pname">${esc(p.name)}</span></div>
      <div class="raw">${Math.round(p.rating)}</div>
      <div class="elo-cell" style="color:${c}">${Math.round(p.active)}${eloDelta}</div>
      <div class="wins-cell" style="color:${winsColor}">${p.wins}</div>
      <div class="podium-cell">${p.podiums.silver}/${p.podiums.bronze}</div>
      <div class="avg-cell" style="color:${avgColor}">${p.avg_position.toFixed(1)}</div>
      <div class="best-cell" style="color:${bestColor}">${p.best_finish}</div>
      <div class="peak-cell">${Math.round(p.peak_rating)}</div>
    </div>`;
  });

  body.innerHTML = html;

  // Attach click handlers
  body.querySelectorAll(".row").forEach(row => {
    row.onclick = () => {
      const name = row.dataset.name;
      if (selected === name) {
        selected = null;
        document.getElementById("chartPanel").style.display = "none";
      } else {
        selected = name;
        const player = eloData.find(p => p.name === name);
        drawChart(player);
      }
      render();
    };
  });

  // Re-draw chart if selected
  if (selected) {
    const player = eloData.find(p => p.name === selected);
    if (player) drawChart(player);
  }
}

// ── INIT ──
render();
</script>
</body>
</html>
